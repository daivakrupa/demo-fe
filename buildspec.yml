version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing NPM dependencies...
      - npm install

  pre_build:
    commands:
      - echo Running lint (optional)...
      - npm run lint || echo "Lint warnings ignored"
      - echo Running tests (optional)...
      - npm test || echo "No test script defined, skipping"

  build:
    commands:
      - echo Building Vue frontend...
      # Fix for Node 18 / Webpack digital envelope issue
      - export NODE_OPTIONS=--openssl-legacy-provider
      - npm run build

  post_build:
    commands:
      - echo Build completed. Preparing for deployment...
      # Only sync if dist/ exists
      - if [ -d "dist" ]; then
          echo "Syncing dist/ to S3...";
          aws s3 sync dist/ s3://demo-dv-frontend --delete;
        else
          echo "dist/ folder not found. Build failed, skipping S3 sync.";
          exit 1;
        fi

artifacts:
  files:
    - '**/*'
  base-directory: dist
